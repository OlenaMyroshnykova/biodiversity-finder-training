name: Train and publish artifacts

on:
  workflow_dispatch:
    inputs:
      country:
        description: "Country code"
        required: true
        default: "ES"
      max_records:
        description: "Maximum GBIF records"
        required: true
        default: "5000"
      min_class_records:
        description: "Minimum records per taxon class"
        required: true
        default: "10"

  schedule:
    - cron: "0 3 * * 1"

jobs:
  train-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest

      - name: Run pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/run_pipeline.py \
            --country "${{ github.event.inputs.country || 'ES' }}" \
            --max-records "${{ github.event.inputs.max_records || '5000' }}" \
            --min-class-records "${{ github.event.inputs.min_class_records || '10' }}"

      - name: Upload artifacts to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/upload_artifacts.py
