name: Train and publish artifacts

on:
  workflow_dispatch:
    inputs:
      country:
        description: "GLOBAL para dataset general, o código de país como ES"
        required: true
        default: "GLOBAL"
      max_records:
        description: "Número máximo de registros GBIF"
        required: true
        default: "20000"
      min_class_records:
        description: "Mínimo de registros por clase"
        required: true
        default: "20"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  train-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest

      - name: Run pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/run_pipeline.py \
            --country "${{ github.event.inputs.country || 'GLOBAL' }}" \
            --max-records "${{ github.event.inputs.max_records || '20000' }}" \
            --min-class-records "${{ github.event.inputs.min_class_records || '20' }}"

      - name: Upload artifacts to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/upload_artifacts.py
