name: Train and publish biodiversity artifacts

on:
  workflow_dispatch:
    inputs:
      country:
        description: "Country code for GBIF. Use GLOBAL for global multi-source dataset."
        required: false
        default: "GLOBAL"
      max_records:
        description: "Maximum number of GBIF records to download"
        required: false
        default: "50000"
      min_class_records:
        description: "Minimum records per taxon class after cleaning"
        required: false
        default: "20"
      max_climate_points:
        description: "Maximum unique coordinate points to enrich with NASA POWER climate data"
        required: false
        default: "250"
      max_vernacular_species:
        description: "Maximum species to enrich with GBIF/Wikidata common names"
        required: false
        default: "3000"
      sample_size:
        description: "Random sample size for development. Use 0 for full dataset."
        required: false
        default: "0"
      sample_random_state:
        description: "Random state for df.sample()"
        required: false
        default: "42"
      offline_max_species:
        description: "Maximum species in the lightweight offline encyclopedia"
        required: false
        default: "2000"
      skip_climate_api:
        description: "Skip NASA POWER API and use latitude-based climate fallback only"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_vernacular_api:
        description: "Skip GBIF Species API for common names"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      skip_wikidata:
        description: "Skip Wikidata SPARQL/Search for common names"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  train-and-publish:
    name: Train model and publish artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      PYTHONPATH: .
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest

      - name: Build pipeline command
        id: build-command
        shell: bash
        run: |
          COMMAND="python scripts/run_pipeline.py"
          COMMAND="$COMMAND --country '${{ github.event.inputs.country }}'"
          COMMAND="$COMMAND --max-records '${{ github.event.inputs.max_records }}'"
          COMMAND="$COMMAND --min-class-records '${{ github.event.inputs.min_class_records }}'"
          COMMAND="$COMMAND --max-climate-points '${{ github.event.inputs.max_climate_points }}'"
          COMMAND="$COMMAND --max-vernacular-species '${{ github.event.inputs.max_vernacular_species }}'"
          COMMAND="$COMMAND --sample-size '${{ github.event.inputs.sample_size }}'"
          COMMAND="$COMMAND --sample-random-state '${{ github.event.inputs.sample_random_state }}'"
          COMMAND="$COMMAND --offline-max-species '${{ github.event.inputs.offline_max_species }}'"

          if [ "${{ github.event.inputs.skip_climate_api }}" = "true" ]; then
            COMMAND="$COMMAND --skip-climate-api"
          fi

          if [ "${{ github.event.inputs.skip_vernacular_api }}" = "true" ]; then
            COMMAND="$COMMAND --skip-vernacular-api"
          fi

          if [ "${{ github.event.inputs.skip_wikidata }}" = "true" ]; then
            COMMAND="$COMMAND --skip-wikidata"
          fi

          echo "command=$COMMAND" >> "$GITHUB_OUTPUT"
          echo "$COMMAND"

      - name: Run training pipeline
        run: |
          ${{ steps.build-command.outputs.command }}

      - name: Upload artifacts to Hugging Face
        run: |
          python scripts/upload_artifacts.py

      - name: Upload local workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: biodiversity-finder-training-artifacts
          path: |
            data/processed/species_encyclopedia.parquet
            data/processed/species_occurrence_points.parquet
            data/processed/species_encyclopedia_light.parquet
            data/processed/species_occurrence_points_light.parquet
            data/interim/conservation_status.csv
            data/interim/vernacular_names.csv
            data/interim/climate_reference.csv
            reports/metrics.json
            reports/classification_report.csv
            reports/eda/
            reports/data_samples/
          if-no-files-found: error
