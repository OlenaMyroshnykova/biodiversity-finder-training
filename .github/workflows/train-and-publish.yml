name: Train and publish biodiversity artifacts

on:
  workflow_dispatch:
    inputs:
      country:
        description: "GLOBAL para dataset general, o código de país como ES"
        required: true
        default: "GLOBAL"
        type: string

      max_records:
        description: "Número máximo de registros GBIF"
        required: true
        default: "50000"
        type: string

      min_class_records:
        description: "Mínimo de registros por clase"
        required: true
        default: "20"
        type: string

      max_climate_points:
        description: "Máximo de puntos climáticos consultados en NASA POWER"
        required: true
        default: "250"
        type: string

      max_vernacular_species:
        description: "Máximo de especies para buscar nombres comunes en GBIF + Wikidata"
        required: true
        default: "3000"
        type: string

      skip_climate_api:
        description: "Saltar NASA POWER y usar solo fallback climático"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      skip_vernacular_api:
        description: "Saltar GBIF Species API para nombres comunes"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      skip_wikidata:
        description: "Saltar Wikidata para nombres comunes"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    branches:
      - main

jobs:
  train-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Resolve workflow parameters
        id: params
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "country=${{ github.event.inputs.country }}" >> "$GITHUB_OUTPUT"
            echo "max_records=${{ github.event.inputs.max_records }}" >> "$GITHUB_OUTPUT"
            echo "min_class_records=${{ github.event.inputs.min_class_records }}" >> "$GITHUB_OUTPUT"
            echo "max_climate_points=${{ github.event.inputs.max_climate_points }}" >> "$GITHUB_OUTPUT"
            echo "max_vernacular_species=${{ github.event.inputs.max_vernacular_species }}" >> "$GITHUB_OUTPUT"
            echo "skip_climate_api=${{ github.event.inputs.skip_climate_api }}" >> "$GITHUB_OUTPUT"
            echo "skip_vernacular_api=${{ github.event.inputs.skip_vernacular_api }}" >> "$GITHUB_OUTPUT"
            echo "skip_wikidata=${{ github.event.inputs.skip_wikidata }}" >> "$GITHUB_OUTPUT"
          else
            echo "country=GLOBAL" >> "$GITHUB_OUTPUT"
            echo "max_records=20000" >> "$GITHUB_OUTPUT"
            echo "min_class_records=20" >> "$GITHUB_OUTPUT"
            echo "max_climate_points=250" >> "$GITHUB_OUTPUT"
            echo "max_vernacular_species=1200" >> "$GITHUB_OUTPUT"
            echo "skip_climate_api=false" >> "$GITHUB_OUTPUT"
            echo "skip_vernacular_api=false" >> "$GITHUB_OUTPUT"
            echo "skip_wikidata=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run training pipeline
        shell: bash
        run: |
          EXTRA_ARGS=""

          if [ "${{ steps.params.outputs.skip_climate_api }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --skip-climate-api"
          fi

          if [ "${{ steps.params.outputs.skip_vernacular_api }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --skip-vernacular-api"
          fi

          if [ "${{ steps.params.outputs.skip_wikidata }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --skip-wikidata"
          fi

          python scripts/run_pipeline.py \
            --country "${{ steps.params.outputs.country }}" \
            --max-records "${{ steps.params.outputs.max_records }}" \
            --min-class-records "${{ steps.params.outputs.min_class_records }}" \
            --max-climate-points "${{ steps.params.outputs.max_climate_points }}" \
            --max-vernacular-species "${{ steps.params.outputs.max_vernacular_species }}" \
            $EXTRA_ARGS

      - name: Upload artifacts to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/upload_artifacts.py
